<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 350 100" width="350" height="100">
  <!-- Yellow Rounded Square Icon -->
  <rect x="10" y="10" width="80" height="80" rx="20" fill="#E8A020" />
  
  <!-- Stylized White Blocks inside the Icon -->
  <!-- Left vertical block -->
  <rect x="28" y="26" width="12" height="48" rx="6" fill="#FFFFFF" />
  <!-- Right top block (hollow) -->
  <rect x="52" y="30" width="16" height="12" rx="4" fill="none" stroke="#FFFFFF" stroke-width="6" />
  <!-- Right bottom block (hollow) -->
  <rect x="52" y="58" width="16" height="12" rx="4" fill="none" stroke="#FFFFFF" stroke-width="6" />

  <!-- Brand Name Text -->
  <!-- LOCKO Text -->
  <text x="110" y="65" font-family="'Work Sans', 'Montserrat', 'Inter', sans-serif" font-size="62" font-weight="900" fill="currentColor" letter-spacing="1">LOCKO</text>
  <!-- Registered Trademark symbol -->
  <text x="325" y="30" font-family="'Work Sans', 'Montserrat', 'Inter', sans-serif" font-size="16" font-weight="bold" fill="currentColor">®</text>

  <!-- Subtitle with lines -->
  <!-- Top Gold Line -->
  <line x1="110" y1="76" x2="335" y2="76" stroke="#E8A020" stroke-width="3" />
  <!-- Subtitle Text -->
  <text x="132" y="88" font-family="'Work Sans', 'Montserrat', 'Inter', sans-serif" font-size="11" font-weight="900" fill="currentColor" letter-spacing="4.5">CONSTRUCTION SUPPLIES</text>
  <!-- Bottom Gold Line -->
  <line x1="110" y1="94" x2="335" y2="94" stroke="#E8A020" stroke-width="1.5" />
</svg>
